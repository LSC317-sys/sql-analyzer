<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 执行计划分析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h1 span {
            font-size: 32px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result-section h2 span {
            margin-right: 8px;
        }

        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .suggestions {
            list-style: none;
        }

        .suggestions li {
            padding: 12px 15px;
            margin: 8px 0;
            background: #fff3cd;
            border-radius: 6px;
            border-left: 4px solid #ffc107;
        }

        .suggestions li:first-child {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .error {
            background: #f8d7da !important;
            border-left-color: #dc3545 !important;
            color: #721c24;
        }

        .history-section {
            margin-top: 30px;
        }

        .history-item {
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
        }

        .history-item code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><span>🔍</span> SQL 执行计划分析器</h1>

    <!-- 输入区 -->
    <div class="input-section">
            <textarea id="sqlInput" placeholder="请输入 SQL 查询语句，例如：

SELECT * FROM users WHERE age > 18;
SELECT u.name, o.order_no FROM users u JOIN orders o ON u.id = o.user_id;

💡 提示：仅支持 SELECT 查询"></textarea>
    </div>

    <button id="analyzeBtn" onclick="analyzeSql()">📊 开始分析</button>

    <!-- 结果区 -->
    <div id="resultSection" class="result-section">
        <h2><span>📋</span> 执行计划</h2>
        <pre id="explainResult"></pre>

        <h2><span>💡</span> 优化建议</h2>
        <ul id="suggestions" class="suggestions"></ul>
    </div>

    <!-- 历史记录 -->
    <div class="history-section">
        <h2><span>📜</span> 历史记录</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // 页面加载时获取历史记录
    window.onload = function() {
        loadHistory();
    };

    // 分析 SQL
    async function analyzeSql() {
        const sql = document.getElementById('sqlInput').value.trim();

        if (!sql) {
            alert('⚠️ 请输入 SQL 语句');
            return;
        }

        const btn = document.getElementById('analyzeBtn');
        btn.disabled = true;
        btn.textContent = '⏳ 分析中...';

        try {
            const response = await fetch('/api/sql/explain', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ sql: sql })
            });

            const result = await response.json();

            if (result.code === 200) {
                // 显示结果
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('explainResult').textContent = result.data.explain;

                // 显示建议
                const suggestionsEl = document.getElementById('suggestions');
                suggestionsEl.innerHTML = result.data.suggestions
                    .map(s => `<li>${s}</li>`)
                    .join('');

                // 刷新历史
                loadHistory();
            } else {
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('explainResult').textContent = '分析失败';
                document.getElementById('suggestions').innerHTML =
                    `<li class="error">❌ ${result.msg}</li>`;
            }
        } catch (e) {
            alert('❌ 请求失败: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = '📊 开始分析';
        }
    }

    // 加载历史记录
    async function loadHistory() {
        try {
            const response = await fetch('/api/sql/history');
            const result = await response.json();

            if (result.code === 200 && result.data.length > 0) {
                const historyEl = document.getElementById('historyList');
                historyEl.innerHTML = result.data
                    .slice(0, 10)
                    .map(item => `
                            <div class="history-item">
                                <code>${item.sqlText.substring(0, 100)}${item.sqlText.length > 100 ? '...' : ''}</code>
                                <br>
                                <small style="color:#666;">${item.createdAt}</small>
                            </div>
                        `)
                    .join('');
            }
        } catch (e) {
            console.error('加载历史失败', e);
        }
    }
</script>
</body>
</html>
